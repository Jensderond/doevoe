services:
  doevoe:
    # `docker compose build` still builds locally; on a server you can skip
    # the build and `docker compose pull` this image instead (requires
    # `docker login ghcr.io` with a read:packages token, since it's private).
    image: ghcr.io/jensderond/doevoe:latest
    build: .
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - data:/data
    environment:
      DOEVOE_HOSTNAME: ${DOEVOE_HOSTNAME:?EHLO hostname, must match the PTR record}
      DOEVOE_EGRESS_IP: ${DOEVOE_EGRESS_IP:?public IP this host sends from}
      DOEVOE_ADMIN_PASSWORD: ${DOEVOE_ADMIN_PASSWORD:?}
      DOEVOE_ADMIN_EMAIL: ${DOEVOE_ADMIN_EMAIL:?}
      DOEVOE_SYSTEM_FROM: ${DOEVOE_SYSTEM_FROM:?}
      DOEVOE_PUBLIC_URL: ${DOEVOE_PUBLIC_URL:-}
volumes:
  data:
